services:
  # --- Databases ---
  auth-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: authdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d authdb"]
      interval: 5s
      retries: 5

  task-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: taskdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d taskdb"]
      interval: 5s
      retries: 5

  user-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d userdb"]
      interval: 5s
      retries: 5

  # --- Backend Microservices ---
  auth-service:
    build: ./auth-service
    environment:
      - DATABASE_URL=postgres://admin:secret@auth-db:5432/authdb
      - JWT_SECRET=secret
      - PORT=3001
    depends_on:
      auth-db:
        condition: service_healthy

  task-service:
    build: ./task-service
    environment:
      - DATABASE_URL=postgres://admin:secret@task-db:5432/taskdb
      - JWT_SECRET=secret
      - PORT=3002
    depends_on:
      task-db:
        condition: service_healthy

  user-service:
    build: ./user-service
    environment:
      - DATABASE_URL=postgres://admin:secret@user-db:5432/userdb
      - JWT_SECRET=secret
      - PORT=3003
    depends_on:
      user-db:
        condition: service_healthy

  log-service:
    build: ./log-service
    environment:
      - DB_HOST=auth-db
      - DB_NAME=authdb
      - DB_USER=admin
      - DB_PASSWORD=secret
      - PORT=3004
      - JWT_SECRET=secret
    depends_on:
      auth-db:
        condition: service_healthy

  # --- Gateway & Static Frontend ---
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - auth-service
      - task-service
      - user-service
      - log-service